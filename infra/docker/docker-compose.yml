services:
  postgres:
    image: postgres:16-alpine
    container_name: market-screener-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-market_screener}
      POSTGRES_USER: ${POSTGRES_USER:-market_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-market_user} -d ${POSTGRES_DB:-market_screener}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: market-screener-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/backend.Dockerfile
    container_name: market-screener-backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: postgresql://${POSTGRES_USER:-market_user}:${POSTGRES_PASSWORD:-change_me_postgres_password}@postgres:5432/${POSTGRES_DB:-market_screener}
      REDIS_URL: redis://redis:6379/${REDIS_DB:-0}
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/ping', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
